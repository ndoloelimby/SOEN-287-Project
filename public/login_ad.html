<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Smart Course Companion - Admin Login</title>
    <link rel="stylesheet" href="/style.css">
    <style>
        .error-banner {
            background: rgba(220, 53, 69, 0.15);
            border: 1px solid rgba(220, 53, 69, 0.5);
            color: #ff6b7a;
            padding: 10px 14px;
            border-radius: 8px;
            margin-bottom: 14px;
            font-size: 14px;
            display: none;
        }
    </style>
</head>
<body class="admin-page">

<div class="container">

    <!-- LEFT SIDE -->
    <div class="left-panel">
        <h1>Administration Portal</h1>
        <p>Manage courses and assessments</p>
    </div>

    <!-- RIGHT SIDE -->
    <div class="right-panel">
        <div class="login-box">

            <h2>Admin Login</h2>
            <p class="subtitle">Access the administration dashboard</p>

            <div class="error-banner" id="error-banner"></div>

            <form action="/auth/login-admin" method="POST">
                <input type="email"    name="email"    placeholder="Admin Email" required>
                <input type="password" name="password" placeholder="Password"    required>

                <div class="form-row">
                    <label><input type="checkbox" name="remember">Remember me</label>
                    <a href="/auth/forgot-password">Forgot password?</a>
                </div>

                <button type="submit" class="admin-btn">Login as Admin</button>
            </form>

            <p class="admin-link">
                Back to <a href="/Login_s.html">Student Login</a>
            </p>

        </div>
    </div>

</div>

<script>
    const error = new URLSearchParams(window.location.search).get('error');
    if (error) {
        const el = document.getElementById('error-banner');
        el.textContent = error;
        el.style.display = 'block';
    }
</script>

</body>
</html>
