<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="/style.css">
    <title>Forgot Password</title>
    <style>
        .error-banner {
            background: rgba(220, 53, 69, 0.15);
            border: 1px solid rgba(220, 53, 69, 0.5);
            color: #ff6b7a;
            padding: 10px 14px;
            border-radius: 8px;
            margin-bottom: 14px;
            font-size: 14px;
            display: none;
        }
    </style>
</head>

<body>
    <div class="container" style="justify-content: center; align-items: center;">

        <!-- DEFAULT VIEW: the email request form -->
        <div class="forgot-password-box" id="request-box">
            <h2 style="text-align: center;">🔒 Password Reset</h2>
            <br>
            <p style="text-align: center;">Provide the email address associated with your account</p>
            <br>

            <div class="error-banner" id="error-banner"></div>

            <!-- ACTION points to backend, METHOD is POST -->
            <form action="/auth/forgot-password" method="POST">
                <label for="email-input" style="color: rgba(255,255,255,0.7); font-size: 13px;">Email:</label>
                <br><br>
                <input type="email" id="email-input" name="email" placeholder="Enter your email" required>
                <br>
                <button type="submit">Send Reset Link</button>
            </form>

            <p class="admin-link" style="margin-top: 15px;">
                Back to <a href="/auth/login-student">Student Login</a>
            </p>
        </div>

        <!-- SUCCESS VIEW: shown after the email is sent (when ?sent=true in URL) -->
        <div class="login-box" id="sent-box" style="display:none; text-align: center; max-width: 400px;">
            <div style="font-size: 50px; margin-bottom: 15px;">✔️</div>
            <h2>Reset Link Sent</h2>
            <p class="subtitle">If that email is registered, you'll receive a reset link shortly. Check your inbox.</p>
            <a href="/auth/login-student">
                <button style="margin-top: 10px;">Back to Login</button>
            </a>
        </div>

    </div>

    <script>
        const params = new URLSearchParams(window.location.search);

        // If ?sent=true → show the success box instead of the form
        if (params.get('sent') === 'true') {
            document.getElementById('request-box').style.display = 'none';
            document.getElementById('sent-box').style.display    = 'block';
        }

        // If ?error=... → show the error banner
        const error = params.get('error');
        if (error) {
            const el = document.getElementById('error-banner');
            el.textContent = error;
            el.style.display = 'block';
        }
    </script>
</body>
</html>
