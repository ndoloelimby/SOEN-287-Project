
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Analytics - COMP 249</title>
    <link rel="stylesheet" href="analytics.css">
</head>

<body>
    <nav class="navbar">
        <h2>Smart Course Companion</h2>
        <ul>
            <li><a href="dashboardtrial.html">Dashboard</a></li>
            <li><a href="MYCOURSES.html">My Courses</a></li>
            <li><a href="analytics.html">Analytics</a></li>
        </ul>
        <div class="nav-icons">
            <div class="lightmode" onclick="toggleTheme()">
                <img src="https://static.thenounproject.com/png/4808961-200.png" 
                    alt="light mode icon"/>
            </div>
            <div class="myaccount">
                <a href="myaccount.html">
                    <img src="https://cdn-icons-png.flaticon.com/512/1144/1144760.png" 
                        alt="My Account"/>
                </a>
            </div>
            <div class="logout">
                <a href="Login_s.html">
                    <img src="https://www.clipartmax.com/png/middle/36-367350_png-file-logout-icon.png" 
                        alt="Logout"/>
                </a>
            </div>
        </div>
    </nav>

    <div class="layout">
        <aside class="sidebar">
            <h2>Analytics</h2>
            <a class="course-link" 
                href="analytics.html">All Courses</a>
            <a class="course-link" 
                href="analytics-soen287.html">SOEN 287</a>
            <a class="course-link active-course" 
                href="analytics-comp249.html">COMP 249</a>
            <a class="course-link" 
                href="analytics-engr233.html">ENGR 233</a>
            <a class="course-link" 
                href="analytics-soen228.html">SOEN 228</a>
        </aside>

        <main class="content">
            <h1>Analytics - COMP 249</h1>

            <section class="stats-grid">

                <div class="stat-card">
                    <h2>Current Average</h2>
                    <div class="stat-body" 
                        style="display:flex; gap:24px;">
                        <div>
                            <p style="font-size:11px; 
                                opacity:0.6; margin-bottom:4px;">
                                Average</p>
                            <div id="averageRing" 
                                class="ring" style="--p:0;">
                                <span class="ring-center" 
                                    id="averageValue">0%</span>
                            </div>
                        </div>
                        <div>
                            <p style="font-size:11px; 
                                opacity:0.6; margin-bottom:4px;">
                                GPA</p>
                            <div id="gpaRing" 
                                class="ring" style="--p:0;">
                                <span class="ring-center" 
                                    id="gpaValue">0</span>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="stat-card">
                    <h2>Assessment Completion</h2>
                    <div class="stat-body">
                        <div class="ring" style="--p:0;">
                            <span class="ring-center" 
                                id="completionValue">0 / 0</span>
                        </div>
                    </div>
                </div>

                <div class="stat-card wide">
                    <h2>Performance Trend</h2>
                    <div id="trendBars">
                        <p style="opacity:0.5;">
                            No graded assessments yet.</p>
                    </div>
                </div>

            </section>
        </main>
    </div>

    <script src="analytics.js"></script>
    <script src="theme.js"></script>
</body>
</html>
