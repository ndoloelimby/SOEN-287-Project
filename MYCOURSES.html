     <nav class="navbar">

        <li><a href="MYCOURSES.html">My Courses</a></li>
        <li><a href="analytics.html">Analytics</a></li>
    </ul>
    <div class="nav-icons">
        <div class="lightmode" onclick="toggleTheme()">
            <img src="https://static.thenounproject.com/png/4808961-200.png" 
                alt="light mode icon"/>
        </div>
        
        <div class="myaccount">
            <a href="myaccount.html">

                    alt="My Account"/>
            </a>
        </div>
        <div class="logout">
            <a href="Login_s.html">

            </a>
        </div>

</nav>


<div class="page">

    <div class="middle">

        <aside class="sidebar">
        <ul>
            
            <li><a class = "active-course" href="Login_s.html">log out</a></li>
            <li> <a class = "active-course"href="myaccount.html"> My Account </a></li>
        </ul>
        </aside>

    <main class="main">

        <div class="topbar">
            <input type="text" id="search" placeholder="Search courses...">

            <select id="sort">
                <option value="card">Card View</option>
                <option value="name">Course Name Only</option>
            </select>
        </div>

        <section class="cards" id="courseContainer"></section>

        <div class="archived-panel">
            <button id="toggleArchived">Hidden Courses ▼</button>
            <div id="archivedContainer" class="hidden cards"></div> 
        </div>

       <div class="calendar-controls">
    <div class="today-label">
      <h3 id = "todayTitle"></h3>  
    </div>
</div>

<div id="calendarContainer"></div>

    </main>
    </div>


</div>


<div class="modal" id="modal">
    <div class="modal-content">
        <h3 id="modalTitle"></h3>
        <button onclick="markDone()">Mark as Done</button>
        <button onclick="closeModal()">Close</button> 
    </div>
</div>

<script src="MYCOURSES.js"></script>
