<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Courses</title>
<link rel="stylesheet" href="MYCOURSES.css">
</head>

<body>
    <nav class="navbar">
    <h2>Smart Course Companion</h2>
    <ul>
        <li><a href="dashboardtrial.html">Dashboard</a></li>
        <li><a href="MYCOURSES.html">My Courses</a></li>
        <li><a href="analytics.html">Analytics</a></li>
    </ul>
    <div class="nav-icons">
        <div class="lightmode" onclick="toggleTheme()">
            <img src="https://static.thenounproject.com/png/4808961-200.png"
                alt="light mode icon"/>
        </div>
        <div class="myaccount">
            <a href="myaccount.html">
                <img src="https://cdn-icons-png.flaticon.com/512/1144/1144760.png"
                    alt="My Account"/>
            </a>
        </div>
        <div class="logout">
            <a href="Login_s.html">
                <img src="https://www.clipartmax.com/png/middle/36-367350_png-file-logout-icon.png"
                    alt="Logout"/>
            </a>
        </div>
    </div>
</nav>


<div class="page">
    <div class="middle">
        <aside class="sidebar">
        <ul>
            <li><a class="active-course" href="Login_s.html">log out</a></li>
            <li><a class="active-course" href="myaccount.html">My Account</a></li>
        </ul>
        </aside>

    <main class="main">
        <section class="page-hero">
            <div>
                <p class="eyebrow">Student Tracker</p>
                <h1>My Courses</h1>
                <p class="hero-copy">
                    Keep your active courses handy and use the day planner below to catch anything due today from the assessments you entered yourself.
                </p>
            </div>
        </section>

        <div class="topbar">
            <input type="text" id="search" placeholder="Search courses...">

            <select id="sort">
                <option value="card">Card View</option>
                <option value="name">Course Name Only</option>
            </select>
        </div>

        <section class="cards" id="courseContainer"></section>

        <div class="archived-panel">
            <button id="toggleArchived">Hidden Courses ▼</button>
            <div id="archivedContainer" class="hidden cards"></div>
        </div>

        <section class="today-planner">
            <div class="today-planner-head">
                <div class="today-label">
                    <p class="eyebrow">Due Today</p>
                    <h3 id="todayTitle"></h3>
                </div>
                <p id="todaySummary" class="today-summary"></p>
            </div>

            <div id="todayAssessments" class="today-assessments"></div>
        </section>
    </main>
    </div>
</div>

<script src="MYCOURSES.js"></script>
</body>
</html>
